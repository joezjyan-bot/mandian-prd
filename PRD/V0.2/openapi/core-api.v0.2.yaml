              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderCreated'
        '410':
          description: Quote expired or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customer/orders/{order_id}/profile:
    post:
      tags: [customer-order]
      summary: 客户提交实名和资料
      operationId: submitCustomerProfile
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCustomerProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileSubmitResult'
  /orders/{order_id}/review/approve:
    post:
      tags: [review]
      summary: 审核通过订单
      operationId: approveOrderReview
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveOrderRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderStateResult'
        '409':
          $ref: '#/components/responses/StatusConflict'
  /orders/{order_id}/funder-assignment:
    post:
      tags: [review]
      summary: 分配内部资金来源
      description: 仅运营端、财务端、风控端内部使用。历史字段名保留 funder_* 兼容,但接口语义为内部资金来源分配;C 端、商家端、合同和客服话术不得展示资方身份、资金来源或合作模式。
      operationId: assignFunder
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignFunderRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FunderAssignmentResult'
        '409':
          $ref: '#/components/responses/BusinessRuleBlocked'
  /orders/{order_id}/contracts:
    post:
      tags: [contract]
      summary: 发起合同或补充合同
      operationId: createOrderContract
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResult'
  /orders/{order_id}/notary-cases:
    post:
      tags: [contract]
      summary: 发起公证
      operationId: createNotaryCase
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotaryRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/NotaryResult'
  /orders/{order_id}/shipments:
    post:
      tags: [fulfillment]
      summary: 创建发货或交付任务
      operationId: createShipment
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShipmentResult'
  /orders/{order_id}/delivery-evidence/face-match:
    post:
      tags: [fulfillment]
      summary: 交付合照 AI 辅助核验
      description: 后台能力,用于人机/人车合照与实名认证影像的一次性比对。只返回辅助结果和流水号;不得建立可检索人脸库,C 端不得暴露人脸比对或风控字眼。
      operationId: createDeliveryEvidenceFaceMatch
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeliveryFaceMatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeliveryFaceMatchResult'
  /orders/{order_id}/device-identifier:
    post:
      tags: [fulfillment]
      summary: 订单记录长租设备识别码
      operationId: recordOrderDeviceIdentifier
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordDeviceIdentifierRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecordDeviceIdentifierResult'
  /orders/{order_id}/return-inspections:
    post:
      tags: [fulfillment]
      summary: 归还验收
      operationId: inspectReturnedDevice
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnInspectionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReturnInspectionResult'
  /wallets/{wallet_id}/withdrawals:
    post:
      tags: [finance]
      summary: 发起提现
      operationId: createWithdrawal
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWithdrawalRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WithdrawalResult'
        '400':
          description: 提现金额不符合 V0.2.1 单笔规则
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                below_minimum:
                  value:
                    code: WITHDRAW_AMOUNT_BELOW_MIN
                    message: 单笔提现金额不能低于 500 元
                    request_id: req_xxx
                above_maximum:
                  value:
                    code: WITHDRAW_AMOUNT_ABOVE_MAX
                    message: 单笔提现金额不能超过 20000 元
                    request_id: req_xxx
        '409':
          description: 提现业务规则拦截
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                daily_limit_exceeded:
                  value:
                    code: WITHDRAW_DAILY_LIMIT_EXCEEDED
                    message: 今日提现次数已达 3 次,请明日再试或联系平台
                    request_id: req_xxx
                account_review_required:
                  value:
                    code: WITHDRAW_MANUAL_REVIEW_REQUIRED
                    message: 当前提现需进入人工审核
                    request_id: req_xxx
  /orders/{order_id}/refunds:
    post:
      tags: [finance]
      summary: 发起退款
      operationId: createRefund
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RefundResult'
  /finance/reversals:
    post:
      tags: [finance]
      summary: 发起财务冲正
      operationId: createReversal
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReversalRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReversalResult'
  /finance/reconciliation-batches:
    post:
      tags: [finance]
      summary: 创建对账批次
      operationId: createReconciliationBatch
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationBatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReconciliationBatchResult'
  /channels:
    post:
      tags: [channel]
      summary: 新增渠道
      operationId: createChannel
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChannelResult'
  /channels/{channel_id}/invite-codes:
    post:
      tags: [channel]
      summary: 生成渠道推广码
      operationId: createChannelInviteCode
      parameters:
        - $ref: '#/components/parameters/RequestId'
