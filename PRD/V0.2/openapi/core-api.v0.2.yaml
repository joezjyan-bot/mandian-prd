openapi: 3.0.3
info:
  title: Mandian Rental Core API
  version: 0.2.1
  description: 满点租赁系统 V0.2.1 核心接口草案，覆盖入驻、办单、下单、审核、内部资金来源、财务和回调主链路。
servers:
  - url: https://api.example.com
    description: placeholder only
tags:
  - name: onboarding
  - name: product
  - name: assistant
  - name: customer-order
  - name: review
  - name: contract
  - name: fulfillment
  - name: finance
  - name: channel
  - name: post-rent
  - name: complaint
  - name: callback
security:
  - bearerAuth: []
paths:
  /merchant-applications:
    post:
      tags: [onboarding]
      summary: 创建商家入驻申请
      operationId: createMerchantApplication
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchantApplicationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MerchantApplicationCreated'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
  /merchant-applications/{application_id}/review:
    post:
      tags: [onboarding]
      summary: 审核商家入驻申请
      operationId: reviewMerchantApplication
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewMerchantApplicationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReviewMerchantApplicationResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '409':
          $ref: '#/components/responses/StatusConflict'
  /products:
    post:
      tags: [product]
      summary: 创建商品和规格
      operationId: createProduct
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductResult'
  /products/{product_id}/submit-review:
    post:
      tags: [product]
      summary: 商家提交商品审核
      operationId: submitProductReview
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductResult'
  /products/{product_id}/copy-to-merchants:
    post:
      tags: [product]
      summary: 平台商品复制给商家
      operationId: copyProductToMerchants
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyProductRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CopyProductResult'
  /assistant/quotes:
    post:
      tags: [assistant]
      summary: 生成办单助手报价
      operationId: createQuote
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QuoteSnapshot'
        '409':
          $ref: '#/components/responses/BusinessRuleBlocked'
  /assistant/qrcodes:
    post:
      tags: [assistant]
      summary: 生成客户下单二维码
      operationId: createOrderQrcode
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQrcodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QrcodeResult'
  /customer/orders:
    post:
      tags: [customer-order]
      summary: 客户扫码创建订单
      operationId: createCustomerOrder
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerOrderRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderCreated'
        '410':
          description: Quote expired or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customer/orders/{order_id}/profile:
    post:
      tags: [customer-order]
      summary: 客户提交实名和资料
      operationId: submitCustomerProfile
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCustomerProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileSubmitResult'
  /orders/{order_id}/review/approve:
    post:
      tags: [review]
      summary: 审核通过订单
      operationId: approveOrderReview
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveOrderRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderStateResult'
        '409':
          $ref: '#/components/responses/StatusConflict'
  /orders/{order_id}/funder-assignment:
    post:
      tags: [review]
      summary: 分配资方
      operationId: assignFunder
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignFunderRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FunderAssignmentResult'
        '409':
          $ref: '#/components/responses/BusinessRuleBlocked'
  /orders/{order_id}/contracts:
    post:
      tags: [contract]
      summary: 发起合同或补充合同
      operationId: createOrderContract
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResult'
  /orders/{order_id}/notary-cases:
    post:
      tags: [contract]
      summary: 发起公证
      operationId: createNotaryCase
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotaryRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/NotaryResult'
  /orders/{order_id}/shipments:
    post:
      tags: [fulfillment]
      summary: 创建发货或交付任务
      operationId: createShipment
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShipmentResult'
  /orders/{order_id}/device-identifier:
    post:
      tags: [fulfillment]
      summary: 订单记录长租设备识别码
      operationId: recordOrderDeviceIdentifier
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordDeviceIdentifierRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecordDeviceIdentifierResult'
  /orders/{order_id}/return-inspections:
    post:
      tags: [fulfillment]
      summary: 归还验收
      operationId: inspectReturnedDevice
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnInspectionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReturnInspectionResult'
  /wallets/{wallet_id}/withdrawals:
    post:
      tags: [finance]
      summary: 发起提现
      operationId: createWithdrawal
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWithdrawalRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WithdrawalResult'
        '400':
          description: 提现金额不符合 V0.2.1 单笔规则
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                below_minimum:
                  value:
                    code: WITHDRAW_AMOUNT_BELOW_MIN
                    message: 单笔提现金额不能低于 500 元
                    request_id: req_xxx
                above_maximum:
                  value:
                    code: WITHDRAW_AMOUNT_ABOVE_MAX
                    message: 单笔提现金额不能超过 20000 元
                    request_id: req_xxx
        '409':
          description: 提现业务规则拦截
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                daily_limit_exceeded:
                  value:
                    code: WITHDRAW_DAILY_LIMIT_EXCEEDED
                    message: 今日提现次数已达 3 次,请明日再试或联系平台
                    request_id: req_xxx
                account_review_required:
                  value:
                    code: WITHDRAW_MANUAL_REVIEW_REQUIRED
                    message: 当前提现需进入人工审核
                    request_id: req_xxx
  /orders/{order_id}/refunds:
    post:
      tags: [finance]
      summary: 发起退款
      operationId: createRefund
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RefundResult'
  /finance/reversals:
    post:
      tags: [finance]
      summary: 发起财务冲正
      operationId: createReversal
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReversalRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReversalResult'
  /finance/reconciliation-batches:
    post:
      tags: [finance]
      summary: 创建对账批次
      operationId: createReconciliationBatch
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationBatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReconciliationBatchResult'
  /channels:
    post:
      tags: [channel]
      summary: 新增渠道
      operationId: createChannel
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChannelResult'
  /channels/{channel_id}/invite-codes:
    post:
      tags: [channel]
      summary: 生成渠道推广码
      operationId: createChannelInviteCode
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InviteCodeResult'
  /post-rent/cases:
    post:
      tags: [post-rent]
      summary: 创建租后案件
      operationId: createPostRentCase
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRentCaseRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PostRentCaseResult'
  /complaints:
    post:
      tags: [complaint]
      summary: 创建或同步客诉
      operationId: createComplaint
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComplaintRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ComplaintResult'
  /callbacks/{channel}/{event_type}:
    post:
      tags: [callback]
      summary: 第三方回调统一入口
      operationId: receiveCallback
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - name: channel
          in: path
          required: true
          schema:
            type: string
        - name: event_type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CallbackAccepted'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    ClientType:
      name: X-Client-Type
      in: header
      required: true
      schema:
        type: string
        enum: [ops, merchant_pc, store_mobile, customer, channel]
    ApplicationId:
      name: application_id
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: string
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
    ChannelId:
      name: channel_id
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PermissionDenied:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IdempotencyConflict:
      description: Idempotency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StatusConflict:
      description: Status conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessRuleBlocked:
      description: Business rule blocked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ApiResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        request_id:
          type: string
        warnings:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          example: VALIDATION_FAILED
        message:
          type: string
        request_id:
          type: string
        field_errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
    CreateMerchantApplicationRequest:
      type: object
      required: [mobile, password, sms_code, agree_terms]
      properties:
        mobile:
          type: string
        password:
          type: string
          format: password
        sms_code:
          type: string
        invite_code:
          type: string
        agree_terms:
          type: boolean
    MerchantApplicationCreated:
      type: object
      properties:
        application_id:
          type: string
        merchant_id:
          type: string
        store_id:
          type: string
        next_step:
          type: string
    ReviewMerchantApplicationRequest:
      type: object
      required: [review_result]
      properties:
        review_result:
          type: string
          enum: [approved, rejected]
        reject_reason:
          type: string
        enabled_capabilities:
          type: array
          items:
            type: string
            enum: [store_order, dividend_order, platform_order]
    ReviewMerchantApplicationResult:
      type: object
      properties:
        merchant_status:
          type: string
        store_status:
          type: string
        wallet_id:
          type: string
        default_config_version:
          type: string
    CreateProductRequest:
      type: object
      required: [name, owner_type, category, skus]
      properties:
        name:
          type: string
        owner_type:
          type: string
          enum: [platform, merchant]
        owner_id:
          type: string
        category:
          type: string
        rent_modes:
          type: array
          items:
            type: string
            enum: [long, short]
        skus:
          type: array
          items:
