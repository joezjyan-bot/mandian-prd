components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    ClientType:
      name: X-Client-Type
      in: header
      required: true
      schema:
        type: string
        enum: [ops, merchant_pc, store_mobile, customer, channel]
    ApplicationId:
      name: application_id
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: string
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
    ChannelId:
      name: channel_id
      in: path
      required: true
      schema:
        type: string
    ShortOrderId:
      name: short_order_id
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PermissionDenied:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IdempotencyConflict:
      description: Idempotency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StatusConflict:
      description: Status conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessRuleBlocked:
      description: Business rule blocked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ApiResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          example: OK
        message:
          type: string
          example: success
        request_id:
          type: string
        warnings:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          example: VALIDATION_FAILED
        message:
          type: string
        request_id:
          type: string
        field_errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
    CreateMerchantApplicationRequest:
      type: object
      required: [mobile, password, sms_code, agree_terms]
      properties:
        mobile:
          type: string
        password:
          type: string
          format: password
        sms_code:
          type: string
        invite_code:
          type: string
        agree_terms:
          type: boolean
    MerchantApplicationCreated:
      type: object
      properties:
        application_id:
          type: string
        merchant_id:
          type: string
        store_id:
          type: string
        next_step:
          type: string
    ReviewMerchantApplicationRequest:
      type: object
      required: [review_result]
      properties:
        review_result:
          type: string
          enum: [approved, rejected]
        reject_reason:
          type: string
        enabled_capabilities:
          type: array
          items:
            type: string
            enum: [merchant_order, joint_order, platform_order]
            x-legacy-enum: [store_order, dividend_order, platform_order]
            description: 展示层统一为商家订单 / 联营订单 / 平台订单;legacy 枚举仅用于历史兼容。
    ReviewMerchantApplicationResult:
      type: object
      properties:
        merchant_status:
          type: string
        store_status:
          type: string
        wallet_id:
          type: string
        default_config_version:
          type: string
    CreateProductRequest:
      type: object
      required: [name, owner_type, category, skus]
      properties:
        name:
          type: string
        owner_type:
          type: string
          enum: [platform, merchant]
        owner_id:
          type: string
        category:
          type: string
        rent_modes:
          type: array
          items:
            type: string
            enum: [long, short]
        skus:
          type: array
          items:
            $ref: '#/components/schemas/ProductSkuInput'
        service_ids:
          type: array
          items:
            type: string
    ProductSkuInput:
      type: object
      required: [sku_type, guide_price]
      properties:
        sku_type:
          type: string
          enum: [new, used]
        condition_label:
          type: string
        attributes:
          type: object
          additionalProperties: true
        guide_price:
          type: integer
        sync_to_assistant:
          type: boolean
    ProductResult:
      type: object
      properties:
        product_id:
          type: string
        review_status:
          type: string
        sync_status:
          type: string
    CopyProductRequest:
      type: object
      required: [merchant_ids, copy_scope]
      properties:
        merchant_ids:
          type: array
          items:
            type: string
        copy_scope:
          type: array
          items:
            type: string
            enum: [base, images, skus, prices, services]
        force_sync:
          type: boolean
    CopyProductResult:
      type: object
      properties:
        copied_count:
          type: integer
        skipped_count:
          type: integer
        task_id:
          type: string
    CreateQuoteRequest:
      type: object
      required: [order_type, merchant_id, store_id, product_id, sku_id, rent_mode, billing_unit, term]
      properties:
        order_type:
          $ref: '#/components/schemas/OrderType'
        merchant_id:
          type: string
        store_id:
          type: string
        product_id:
          type: string
        sku_id:
          type: string
        rent_mode:
          type: string
          enum: [long, short]
        billing_unit:
          type: string
          enum: [hour, day, week, month]
        term:
          type: integer
          minimum: 1
        down_payment:
          type: integer
          description: amount in cents
        selected_service_ids:
          type: array
          items:
            type: string
        config_version_id:
          type: string
          description: 办单助手配置版本;为空时按当前生效版本计算。
        rate_base:
          type: string
          enum: [unpaid_x_rate, price_x_rate, remaining_multiplier]
          description: 费率口径,与报价配置版本一致。
        nominal_retain_fee_cent:
          type: integer
          description: 名义留购费,单位分;展示层按业务话术处理。
        funding_ratio:
          type: integer
          minimum: 20
          maximum: 80
    QuoteSnapshot:
      type: object
      properties:
        quote_snapshot_id:
          type: string
        quote_snapshot_no:
          type: string
          description: 报价快照编号,用于后台检索和二维码追踪。
        config_version_id:
          type: string
        rate_base:
          type: string
          enum: [unpaid_x_rate, price_x_rate, remaining_multiplier]
        nominal_retain_fee_cent:
          type: integer
          description: 名义留购费,单位分。
        value_added_services:
          type: array
          items:
            $ref: '#/components/schemas/ValueAddedServiceSnapshot'
        price_items:
          type: array
          items:
            $ref: '#/components/schemas/PriceItem'
        bill_plan_preview:
          type: array
          items:
            $ref: '#/components/schemas/BillPreviewItem'
        funding_preview:
          $ref: '#/components/schemas/FundingPreview'
        expires_at:
          type: string
          format: date-time
    ValueAddedServiceSnapshot:
      type: object
      required: [service_id, charge_in, in_buyout_total, force_checked, default_checked]
      properties:
        service_id:
          type: string
        service_name:
          type: string
        amount:
          type: integer
          description: amount in cents
        charge_in:
          type: string
          enum: [upfront, bill, retain, waived]
          description: 收费归属;不得在 C 端展示内部成本或利润。
        in_buyout_total:
          type: boolean
        force_checked:
          type: boolean
        default_checked:
          type: boolean
    PriceItem:
      type: object
      properties:
        code:
          type: string
        label:
          type: string
        amount:
          type: integer
          description: amount in cents
    BillPreviewItem:
      type: object
      properties:
        period_no:
          type: integer
        bill_type:
          type: string
        amount_due:
          type: integer
        due_rule:
          type: string
    FundingPreview:
      type: object
      description: 仅办单助手、运营端和财务端内部预览使用;C 端禁止返回该对象。
      properties:
        funding_ratio:
          type: integer
          description: 内部资金来源占比,不得在 C 端展示。
        store_ratio:
          type: integer
          description: 商家侧投入占比,不得在 C 端展示。
        funder_amount:
          type: integer
          description: 内部资金来源金额,字段名兼容保留,不得在 C 端展示。
        store_amount:
          type: integer
          description: 商家侧金额,不得在 C 端展示为结算价或利润。
    CreateQrcodeRequest:
      type: object
      required: [quote_snapshot_id, valid_minutes]
      properties:
        quote_snapshot_id:
          type: string
        valid_minutes:
          type: integer
        channel_id:
          type: string
        staff_id:
          type: string
    QrcodeResult:
      type: object
      properties:
        qrcode_id:
          type: string
        qrcode_payload:
          type: string
        qrcode_image_url:
          type: string
        expires_at:
          type: string
          format: date-time
    ReviseQuoteSnapshotRequest:
      type: object
      required: [change_reason, confirm_token]
      properties:
        change_reason:
          type: string
        confirm_token:
          type: string
        term:
          type: integer
          minimum: 1
        down_payment:
          type: integer
          description: amount in cents
        selected_service_ids:
          type: array
          items:
            type: string
        nominal_retain_fee_cent:
          type: integer
          description: 名义留购费,单位分。
    VoidQuoteSnapshotRequest:
      type: object
      required: [void_reason, confirm_token]
      properties:
        void_reason:
          type: string
        confirm_token:
          type: string
    QuoteSnapshotMutationResult:
      type: object
      properties:
        quote_snapshot_id:
          type: string
        mutation_status:
          type: string
          enum: [voided, rejected]
        old_snapshot_status:
          type: string
        audit_log_id:
          type: string
    CustomerQuoteSnapshot:
      type: object
      description: C 端扫码下单报价白名单 DTO,不得包含 `funding_preview`、内部资金来源、商家结算价、平台利润和返点规则。
      properties:
        quote_snapshot_id:
          type: string
        quote_snapshot_no:
          type: string
        order_type_display:
          type: string
          enum: [商家订单, 联营订单, 平台订单]
        product_summary:
          type: object
          additionalProperties: true
        customer_price_items:
          type: array
          items:
            $ref: '#/components/schemas/PriceItem'
        bill_plan_preview:
          type: array
          items:
            $ref: '#/components/schemas/BillPreviewItem'
        expires_at:
          type: string
          format: date-time
    CreateCustomerOrderRequest:
