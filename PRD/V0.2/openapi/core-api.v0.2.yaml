      required: [qrcode_payload, quote_snapshot_id, customer_source]
      properties:
        qrcode_payload:
          type: string
        quote_snapshot_id:
          type: string
        customer_open_id:
          type: string
        customer_source:
          type: string
          enum: [alipay, wechat, h5, app]
    OrderCreated:
      type: object
      properties:
        order_id:
          type: string
        order_no:
          type: string
        product_line:
          type: string
          description: C 端只返回业务入口,不返回内部审核或资金配置字段。
