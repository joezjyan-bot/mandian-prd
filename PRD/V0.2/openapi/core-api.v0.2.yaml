openapi: 3.0.3
info:
  title: Mandian Rental Core API
  version: 0.2.2
  description: 满点租赁系统 V0.2.2 核心接口契约评审基线，覆盖入驻、办单、下单、审核、内部资金来源、财务和回调主链路。C 端、商家端、客服话术和合同正文不得暴露资方、资金来源、合作模式、风控结论、内部审核备注、服务费拆分、商家结算价、平台利润、返点规则、内部标签、黑名单或灰名单结论。
x-v0-2-2-contract-status:
  scope: PRD 接口契约评审基线
  blocking_notes:
    - 本文件为研发评审基线;开工前必须按 20_API最终契约验收清单逐接口补齐 request/response DTO、错误码、权限、幂等键、审计字段和状态流转并勾销。
    - 技术内部字段可保留 legacy 命名,但展示层统一使用商家订单 / 联营订单 / 平台订单。
    - 内部资金来源相关字段仅运营端、财务端、风控端可见,禁止进入 C 端、商家端、合同、客服话术。
servers:
  - url: https://api.example.com
    description: placeholder only
tags:
  - name: onboarding
  - name: product
  - name: assistant
  - name: customer-order
  - name: review
  - name: contract
  - name: fulfillment
  - name: finance
  - name: channel
  - name: post-rent
  - name: complaint
  - name: callback
  - name: short-rent
  - name: im
  - name: legal
security:
  - bearerAuth: []
paths:
  /merchant-applications:
    post:
      tags: [onboarding]
      summary: 创建商家入驻申请
      operationId: createMerchantApplication
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchantApplicationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MerchantApplicationCreated'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
  /merchant-applications/{application_id}/review:
    post:
      tags: [onboarding]
      summary: 审核商家入驻申请
      operationId: reviewMerchantApplication
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewMerchantApplicationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReviewMerchantApplicationResult'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '409':
          $ref: '#/components/responses/StatusConflict'
  /products:
    post:
      tags: [product]
      summary: 创建商品和规格
      operationId: createProduct
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductResult'
  /products/{product_id}/submit-review:
    post:
      tags: [product]
      summary: 商家提交商品审核
      operationId: submitProductReview
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductResult'
  /products/{product_id}/copy-to-merchants:
    post:
      tags: [product]
      summary: 平台商品复制给商家
      operationId: copyProductToMerchants
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyProductRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CopyProductResult'
  /assistant/quotes:
    post:
      tags: [assistant]
      summary: 生成办单助手报价
      operationId: createQuote
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QuoteSnapshot'
        '409':
          $ref: '#/components/responses/BusinessRuleBlocked'
  /assistant/qrcodes:
    post:
      tags: [assistant]
      summary: 生成客户下单二维码
      operationId: createOrderQrcode
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQrcodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QrcodeResult'
  /assistant/quotes/{quote_snapshot_id}:
    get:
      tags: [assistant]
      summary: 读取办单助手报价快照
      operationId: getQuoteSnapshot
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/ClientType'
        - name: quote_snapshot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QuoteSnapshot'
        '410':
          description: Quote expired or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /assistant/quotes/{quote_snapshot_id}/revision:
    post:
      tags: [assistant]
      summary: 基于报价快照生成新版本
      description: 报价快照不可原地改写;改快照必须生成新 `quote_snapshot_id`,旧快照保留审计轨迹。
      operationId: reviseQuoteSnapshot
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: quote_snapshot_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviseQuoteSnapshotRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QuoteSnapshot'
        '409':
          $ref: '#/components/responses/BusinessRuleBlocked'
  /assistant/quotes/{quote_snapshot_id}/void:
    post:
      tags: [assistant]
      summary: 作废未下单报价快照
      operationId: voidQuoteSnapshot
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: quote_snapshot_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoidQuoteSnapshotRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/QuoteSnapshotMutationResult'
        '409':
          $ref: '#/components/responses/BusinessRuleBlocked'
  /customer/quote-snapshots/{quote_snapshot_id}:
    get:
      tags: [customer-order]
      summary: C 端读取扫码报价快照
      description: 只返回客户下单所需白名单字段;禁止返回内部资金来源、商家结算价、平台利润、返点规则和内部审核字段。
      operationId: getCustomerQuoteSnapshot
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/ClientType'
        - name: quote_snapshot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CustomerQuoteSnapshot'
        '410':
          description: Quote expired or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /customer/orders:
    post:
      tags: [customer-order]
      summary: 客户扫码创建订单
      operationId: createCustomerOrder
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ClientType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerOrderRequest'
      responses:
        '200':
          description: OK
          content:
