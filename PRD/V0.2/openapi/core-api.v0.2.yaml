          type: string
        id_card_encrypted:
          type: string
        mobile:
          type: string
        address:
          type: object
          additionalProperties: true
        contacts:
          type: array
          items:
            type: object
            additionalProperties: true
        attachment_ids:
          type: array
          items:
            type: string
        location:
          type: object
          additionalProperties: true
    ProfileSubmitResult:
      type: object
      properties:
